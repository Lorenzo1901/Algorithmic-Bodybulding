name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Build Android APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv frontend/android/app/build/outputs/apk/debug/app-debug.apk Algorithmic-Bodybuilding.apk

      - name: Update Latest Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Update"
          body: "This is the latest automatic build of the Algorithmic Bodybuilding app."
          files: Algorithmic-Bodybuilding.apk
          make_latest: "true"
